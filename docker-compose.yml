services:
  mysql:
    image: mysql:8.0
    container_name: kris-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kris-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kris-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - kris-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: kris-web
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - kris-net

volumes:
  mysql_data:

networks:
  kris-net:
    driver: bridge
